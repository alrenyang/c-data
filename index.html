    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --sidebar-width: 240px;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
        }

        nav {
            width: var(--sidebar-width);
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); margin-bottom: 2rem; }

        .menu-item {
            padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 8px;
            cursor: pointer; transition: all 0.2s; text-decoration: none; color: inherit;
        }

        .menu-item:hover, .menu-item.active { background-color: var(--primary-color); color: white; }

        main { flex: 1; padding: 2rem; overflow-y: auto; }

        .section {
            display: none; background: white; padding: 2rem;
            border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .section.active { display: block; }

        #login-section { max-width: 400px; margin: 100px auto; text-align: center; }

        input {
            width: 100%; padding: 0.75rem; margin: 0.5rem 0;
            border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 0.75rem; background: var(--primary-color);
            color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
        }

        .profile-group { margin-bottom: 1.5rem; max-width: 400px; }
        .profile-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid #e2e8f0; }
        
        .status-box { background: #f1f5f9; padding: 1rem; border-radius: 6px; font-size: 0.85rem; margin-top: 1rem; }
    </style>
</head>
<body>

    <nav id="sidebar" style="display: none;">
        <div class="logo">C-DATA</div>
        <div class="menu-item active" onclick="showSection('material')">자재관리</div>
        <div class="menu-item" onclick="showSection('company')">업체관리</div>
        <div class="menu-item" onclick="showSection('sales')">매출관리</div>
        <div class="menu-item" onclick="showSection('profile')" style="margin-top: auto;">계정설정</div>
        <div class="menu-item" onclick="logout()" style="color: #ef4444;">로그아웃</div>
    </nav>

    <main>
        <!-- 로그인 섹션 -->
        <div id="login-section" class="section active">
            <h1 style="color: var(--primary-color)">C-DATA</h1>
            <p>관리자 로그인 (batman / forever)</p>
            <input type="text" id="login-id" placeholder="아이디">
            <input type="password" id="login-pw" placeholder="비밀번호">
            <button onclick="login()">접속하기</button>
            <div class="status-box">기본 계정: batman / 비번: forever</div>
        </div>

        <!-- 자재관리 -->
        <div id="material-section" class="section">
            <h2>자재 실시간 관리</h2>
            <button style="width: auto; margin-bottom: 1rem;">+ 새 자재 추가</button>
            <table>
                <thead>
                    <tr><th>품목명</th><th>재고량</th><th>보관위치</th><th>최근수정</th></tr>
                </thead>
                <tbody>
                    <tr><td>샘플 자재</td><td>100</td><td>A-1 선반</td><td>2024-03-30</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 업체관리 -->
        <div id="company-section" class="section">
            <h2>업체 정보 관리</h2>
            <p>협력 업체 리스트 및 연락처를 관리합니다.</p>
        </div>

        <!-- 매출관리 -->
        <div id="sales-section" class="section">
            <h2>매출 현황</h2>
            <p>일별/월별 매출 데이터를 집계합니다.</p>
        </div>

        <!-- 계정설정 -->
        <div id="profile-section" class="section">
            <h2>계정 정보 수정</h2>
            <p>데이터베이스에 저장될 로그인 정보를 업데이트합니다.</p>
            <div class="profile-group">
                <label>아이디 변경</label>
                <input type="text" id="new-id" value="batman">
            </div>
            <div class="profile-group">
                <label>비밀번호 변경</label>
                <input type="password" id="new-pw" value="forever">
            </div>
            <button onclick="saveProfile()" style="width: auto;">DB 정보 업데이트</button>
        </div>
    </main>

    <script>
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(sectionId + '-section').classList.add('active');
            
            // 메뉴 활성화 처리
            const items = document.querySelectorAll('.menu-item');
            items.forEach(item => {
                if(item.innerText.includes(getMenuName(sectionId))) item.classList.add('active');
            });
        }

        function getMenuName(id) {
            const names = { material: '자재', company: '업체', sales: '매출', profile: '계정' };
            return names[id];
        }

        function logout() {
            if(confirm('로그아웃 하시겠습니까?')) location.reload();
        }
    </script>
</body>
</html>
