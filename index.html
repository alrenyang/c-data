<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-DATA | 통합 자재 관리 시스템</title>
    <!-- Firebase SDK (v10+) -->
    <script type="module">
        // Firebase 앱 및 서비스 로드 (가이드용)
        // 실제 사용 시 여기에 본인의 Firebase 설정값을 입력해야 합니다.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // TODO: Firebase Console에서 앱 설정을 복사하여 아래를 채워주세요.
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_ID",
            appId: "YOUR_APP_ID"
        };

        // Firebase 초기화 (설정값이 올바르지 않으면 오류가 발생할 수 있습니다)
        // const app = initializeApp(firebaseConfig);
        // const auth = getAuth(app);
        // const db = getFirestore(app);
    </script>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --sidebar-width: 240px;
            --text-color: #1e293b;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
        }

        /* 사이드바 */
        nav {
            width: var(--sidebar-width);
            background: #ffffff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 2rem;
        }

        .menu-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .menu-item:hover, .menu-item.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* 메인 콘텐츠 */
        main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .section {
            display: none;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .section.active {
            display: block;
        }

        /* 로그인 레이아웃 (임시) */
        #login-section {
            max-width: 400px;
            margin: 100px auto;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .status {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <nav id="sidebar" style="display: none;">
        <div class="logo">C-DATA</div>
        <div class="menu-item active" onclick="showSection('material')">자재관리</div>
        <div class="menu-item" onclick="showSection('company')">업체관리</div>
        <div class="menu-item" onclick="showSection('sales')">매출관리</div>
        <div class="menu-item" onclick="showSection('profile')" style="margin-top: auto;">계정설정</div>
        <div class="menu-item" onclick="logout()" style="color: #ef4444;">로그아웃</div>
    </nav>

    <main>
        <!-- 로그인 섹션 -->
        <div id="login-section" class="section active">
            <h2>로그인</h2>
            <p>가이드: 파이어베이스 이메일 인증을 사용합니다.</p>
            <input type="email" id="email" placeholder="이메일">
            <input type="password" id="password" placeholder="비밀번호">
            <button onclick="login()">로그인</button>
            <div class="status">실제 연동을 위해 Firebase API Key가 필요합니다.</div>
        </div>

        <!-- 자재관리 섹션 -->
        <div id="material-section" class="section">
            <h2>자재관리</h2>
            <p>실시간 재고 현황 (Firestore 연동 예정)</p>
            <button style="width: auto; margin-bottom: 1rem;">+ 새 자재 등록</button>
            <table>
                <thead>
                    <tr>
                        <th>품명</th>
                        <th>수량</th>
                        <th>위치</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>기본 자재 A</td>
                        <td>150</td>
                        <td>창고 1</td>
                        <td>정상</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 업체관리 섹션 -->
        <div id="company-section" class="section">
            <h2>업체관리</h2>
            <p>협력 업체 정보 및 연락처 관리 섹션입니다.</p>
        </div>

        <!-- 매출관리 섹션 -->
        <div id="sales-section" class="section">
            <h2>매출관리</h2>
            <p>월별/항목별 매출 통계 및 데이터 관리 섹션입니다.</p>
        </div>

        <!-- 계정설정 섹션 -->
        <div id="profile-section" class="section">
            <h2>계정설정</h2>
            <p>로그인 정보(아이디/비밀번호)를 수정할 수 있습니다.</p>
            <label>비밀번호 변경</label>
            <input type="password" placeholder="새 비밀번호">
            <button style="width: auto;">변경 내용 저장</button>
        </div>
    </main>

    <script>
        // 화면 전환 로직
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            
            document.getElementById(sectionId + '-section').classList.add('active');
            event.target.classList.add('active');
        }

        // 로그인 시뮬레이션
        function login() {
            // 실제 구현 시 Firebase Auth 연동
            alert('가이드 모드: 로그인을 시뮬레이션합니다.');
            document.getElementById('login-section').classList.remove('active');
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('material-section').classList.add('active');
        }

        function logout() {
            if(confirm('로그아웃 하시겠습니까?')) {
                location.reload();
            }
        }
    </script>
</body>
</html>
